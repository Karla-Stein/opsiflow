{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}


{% block extra_css %}
<link rel="stylesheet" href="{% static 'profiles/css/profiles.css' %}">
{% endblock %}

{% block content %}
<section id="my-profile" class="my-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-4 offset-lg-2 text-center mb-5">
                <h2>
                    My Profile
                </h2>
                <hr>
            </div>
        </div>
        <div class="row justify-content-center">
            <div  class="col-12 col-md-6 col-lg-5 offset-lg-2 text-center mb-5">
                <h2 >
                    Default Billing Details
                </h2>

            </div>
        </div>
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6 offset-lg-2 text-center">
                <form method="post" action="{% url 'my_profile' %}" id="profile-form">
                    {% csrf_token %}
                    {{ form|crispy }}
                  
                    <div class="text-end">
                    <a id="delete-details" type="submit" class="btn btn-signup btn-outline-dark btn-sm">Delete Details</a>
                    <button id="submit-details" type="submit" class="btn btn-signup btn-outline-dark btn-sm">Update Details</button>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
</section>

{% endblock%}
