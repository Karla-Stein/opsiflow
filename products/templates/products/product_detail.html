{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'products/css/product_detail.css' %}">
{% endblock %}


{% block content %}

<section id="detail">
    <div class="container">
        <div class="row align-items-center justify-content-center">
             <div class="col-8 offset-lg-2 pt-5">
                <img src="{{ product.image.url }}" alt="{{ product.name }}" class="img-fluid">
            </div>
            <div class="col-8 offset-lg-2 pt-5 text-center">
                <h2 class="mb-3 display-5">{{ product.name }}
                </h2>
                <p class="index-p">{{ product.description }}</p>
            </div>
            
        </div>
        <div class="row justify-content-center mt-5">
            <div class="col-2 offset-lg-3">
                 <div class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
                    aria-expanded="false">
                    Options
                </button>
                <ul class="dropdown-menu">
                     {% for option in product_option %}
                    <li><a class="dropdown-item" href="#">{{ option.name }}</a></li>
                    {% endfor %}
                </ul>
            </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
