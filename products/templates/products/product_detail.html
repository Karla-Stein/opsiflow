{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'products/css/product_detail.css' %}">
{% endblock %}


{% block content %}
<div class="container d-flex justify-content-center align-items-center detail-div">
    <div class="row justify-content-center align-items-center">
        <div class="col-12 col-md-8">
            <img src="{{ product.image.url }}" alt="{{ product.name }}">
        </div>
        <div class="col-12 col-md-4 text-center">
            <p>{{ product.name }}</p>
            <p>{{ product.description }}</p>
            <div class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
                    aria-expanded="false">
                    Options
                </button>
                <ul class="dropdown-menu">
                     {% for option in product_option %}
                    <li><a class="dropdown-item" href="#">{{ option.name }}</a></li>
                    {% endfor %}
                </ul>
            </div>
          
        </div>
    </div>
</div>

{% endblock %}
