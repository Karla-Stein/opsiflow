{% extends 'base.html' %}
{% load static %}


{% block extra_css %}
<link rel="stylesheet" href="{% static 'checkout/css/checkout.css' %}">
{% endblock %}

{% block content %}
<section id="checkout" class="my-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 offset-lg-2 text-center mb-5">
                <h2>
                    CHECKOUT
                </h2>
                <hr>
            </div>
            <!-- left column -->
           <div class="col-12 col-lg-5 offset-lg-2">
            <h3>Order Summary</h3>
            <hr>
            <!-- order summary row -->
             <div class="row">
                <div class="col-2">
                   <p> product images</p>
                </div>
                <div class="col-6">
                    <p>item name</p>
                    <p>qnt</p>
                </div>
                <div class="col-2">
                    item price:
                </div>
                  <div class="col-2">
                    $99
                </div>
             </div>
             <hr>

             <!-- order total row -->
              <div class="row justify-content-end">
                <div class="col-6">
                    empty
                </div>
                <div class="col-3">
                    <p>order total:</p>
                    <p>discount:</p>
                    <p>gran total:</p>
                </div>
                <div class="col-2">
                    <p>$200</p>
                    <p>-$15</p>
                    <p>$185</p>
                </div>
              </div>

           </div>
           <div class="col-12 col-lg-5">
            <h3>
                Your Details
            </h3>
            <hr>
           </div>
        </div>
    </div>
</section>

{% endblock%}
