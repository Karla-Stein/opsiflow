<div class="toast position-absolute top-10 end-0 text-bg-warning" role="alert" aria-live="assertive" aria-atomic="true">
  <div class="toast-header">
    <small class="me-auto">{{product.name}}</small>
    <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
  </div>
  <div class="toast-body">
    {{message}}
  </div>
</div>
