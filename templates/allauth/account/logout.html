{% extends "base.html" %}
{% load static %}

{% load i18n %}

{% block head_title %}{% trans "Sign Out" %}{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-6 offset-lg-2 text-center">
      <h1>{% trans "Sign Out" %}</h1>
      <hr>

      <p class="text-muted">{% trans 'Are you sure you want to sign out?' %}</p>

      <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        {% if redirect_field_value %}
        <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
        {% endif %}
        <button type="submit" class="rounded">{% trans 'Sign Out' %}</button>
        <button type="submit" href="{% url 'home' %}" class="rounded ms-2">{% trans 'Stay' %}</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
